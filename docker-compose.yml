services:
  android-builder:
    image: eclipse-temurin:11-jdk
    container_name: android-builder
    working_dir: /app
    volumes:
      - .:/app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "19006:19006"
    stdin_open: true
    tty: true
    networks:
      - builder_network

  dev:
    image: castafiore:dev
    build:
      context: .
      dockerfile: Dockerfile.webapp
      target: dev
    ports:
      - 8081:8081
  
  web:
    image: castafiore:web
    build:
      context: .
      dockerfile: Dockerfile.webapp
    ports:
      - 8081:80

networks:
  builder_network:
    driver: bridge